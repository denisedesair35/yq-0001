<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日心情记录</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🌈 每日心情记录</h1>

    <div class="input-section">
      <textarea 
        id="moodInput" 
        placeholder="今天的心情怎么样？记录一下吧..."
        rows="4"
      ></textarea>
      <button id="submitBtn">记录心情</button>
      <p id="message" class="message"></p>
    </div>

    <div class="history-section">
      <h2>📝 历史记录</h2>
      <ul id="moodList" class="mood-list"></ul>
    </div>
  </div>

  <div id="editModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>✏️ 编辑心情</h3>
        <span class="close-btn" id="closeModal">&times;</span>
      </div>
      <div class="modal-body">
        <textarea id="editMoodInput" rows="4" placeholder="修改你的心情..."></textarea>
      </div>
      <div class="modal-footer">
        <button id="cancelEditBtn" class="btn-secondary">取消</button>
        <button id="saveEditBtn" class="btn-primary">保存修改</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
